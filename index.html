<style>
:root {
  --bg:       #0d0d0d;
  --bg2:      #131313;
  --bg3:      #1a1a1a;
  --card:     #161616;
  --border:   #222;
  --border2:  #2e2e2e;
  --amber:    #f59e0b;
  --amber2:   #fbbf24;
  --amber-bg: rgba(245,158,11,.09);
  --amber-bd: rgba(245,158,11,.28);
  --blue:     #60a5fa;
  --blue2:    #93c5fd;
  --blue-bg:  rgba(96,165,250,.09);
  --blue-bd:  rgba(96,165,250,.28);
  --green:    #34d399;
  --green-bg: rgba(52,211,153,.1);
  --green-bd: rgba(52,211,153,.3);
  --red:      #f87171;
  --text:     #f0f0f0;
  --text2:    #909090;
  --text3:    #505050;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:400;line-height:1.7;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:200;background:rgba(13,13,13,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 1.5rem}
.nav-inner{max-width:1140px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:62px}
.brand{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.07em;display:flex;align-items:center;gap:.4rem}
.brand .bm{color:var(--amber)}.brand .ba{color:var(--text3);font-size:.95rem}.brand .bn{color:var(--blue)}
.nav-r{display:flex;align-items:center;gap:1.5rem}
.nav-links{display:flex;gap:1.5rem;list-style:none}
.nav-links a{color:var(--text2);text-decoration:none;font-size:.84rem;font-weight:500;transition:color .2s;letter-spacing:.02em}
.nav-links a:hover{color:var(--text)}
.ltog{display:flex;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.lbtn{padding:.33rem .72rem;cursor:pointer;color:var(--text3);border:none;background:none;font-family:'JetBrains Mono',monospace;font-size:.73rem;font-weight:500;letter-spacing:.05em;transition:all .2s}
.lbtn.on{background:var(--border2);color:var(--text)}

/* ── HERO ── */

.hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom, rgba(13,13,13,.3) 0%, rgba(13,13,13,.55) 60%, rgba(13,13,13,1) 100%)}
.hero-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
.avail-badge{display:inline-flex;align-items:center;gap:.5rem;background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);border-radius:20px;padding:.35rem 1rem;font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.8rem}
.avail-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.hero-eye{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:1rem}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,5vw,4rem);line-height:.95;letter-spacing:.04em;margin-bottom:1.2rem;opacity:.75}
.htM{color:var(--amber);display:block;text-shadow:0 0 60px rgba(245,158,11,.3)}
.htA{color:rgba(255,255,255,.2);font-size:.38em;display:block;line-height:1.7}
.htN{color:var(--blue);display:block;text-shadow:0 0 60px rgba(96,165,250,.3)}
.hero-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:.55rem;margin-bottom:2.8rem}
.htag{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;padding:.28rem .75rem;border-radius:4px;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);background:rgba(0,0,0,.3)}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.cta-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.6rem;border-radius:8px;font-size:.88rem;font-weight:600;text-decoration:none;letter-spacing:.02em;transition:all .22s}
.cta-m{background:var(--amber);color:#000}.cta-m:hover{background:var(--amber2);transform:translateY(-2px)}
.cta-n{background:var(--blue);color:#000}.cta-n:hover{background:var(--blue2);transform:translateY(-2px)}
.hero-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:.3;animation:sb 2.5s ease-in-out infinite;z-index:2}

/* ── PHONE BAR ── */
.phone-bar{position:relative;z-index:2;display:flex;gap:1.2rem;flex-wrap:wrap;justify-content:center;margin-top:2rem}
.phone-card{display:flex;flex-direction:column;align-items:center;gap:.4rem;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:1rem 1.8rem}
.phone-card.pcm{border-color:rgba(245,158,11,.4)}
.phone-card.pcn{border-color:rgba(96,165,250,.4)}
.phone-who{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em}
.phone-card.pcm .phone-who{color:var(--amber)}
.phone-card.pcn .phone-who{color:var(--blue)}
.phone-num{font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:500;color:#fff;letter-spacing:.04em;text-decoration:none}
.phone-num:hover{color:var(--amber)}
.phone-card.pcn .phone-num:hover{color:var(--blue)}
.hero-scroll span{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase}
.scroll-line{width:1px;height:32px;background:linear-gradient(to bottom,rgba(255,255,255,.6),transparent)}
@keyframes sb{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}

/* ── AVAILABILITY STRIP ── */
.avail-strip{background:var(--green-bg);border-top:1px solid var(--green-bd);border-bottom:1px solid var(--green-bd);padding:1.4rem 1.5rem;text-align:center}
.avail-strip-inner{max-width:1140px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:1.5rem;flex-wrap:wrap}
.avail-strip-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--green);display:flex;align-items:center;gap:.5rem}
.avail-strip-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite}
.avail-strip-text{font-size:.9rem;color:var(--text2)}
.avail-strip-text strong{color:var(--text);font-weight:600}

/* ── SHARED ── */
.wrap{max-width:1140px;margin:0 auto;padding:0 1.5rem}
.sec-eye{font-family:'JetBrains Mono',monospace;font-size:.67rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:.4rem}
.sec-h{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,4vw,3rem);letter-spacing:.03em;line-height:1;color:var(--text)}
.sec-hdr{margin-bottom:2.5rem}
.two{display:grid;grid-template-columns:1fr 1fr;gap:3.5rem}
.col-hdr{display:flex;align-items:center;gap:.8rem;padding-bottom:1.2rem;margin-bottom:2rem;border-bottom:1px solid var(--border)}
.cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cdot.a{background:var(--amber);box-shadow:0 0 10px var(--amber)}
.cdot.b{background:var(--blue);box-shadow:0 0 10px var(--blue)}
.cname{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.04em}

/* ── PROFILES ── */
.prof-sec{padding:5rem 1.5rem}
.prof-grid{max-width:1140px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2.5rem;position:relative;overflow:hidden;transition:border-color .25s,transform .25s}
.pcard:hover{transform:translateY(-4px)}
.pcard.m:hover{border-color:var(--amber-bd);box-shadow:0 8px 40px rgba(245,158,11,.08)}
.pcard.n:hover{border-color:var(--blue-bd);box-shadow:0 8px 40px rgba(96,165,250,.08)}
.pcard::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.pcard.m::after{background:linear-gradient(90deg,var(--amber),var(--amber2))}
.pcard.n::after{background:linear-gradient(90deg,var(--blue),var(--blue2))}
.pbadge{display:inline-flex;font-family:'JetBrains Mono',monospace;font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;padding:.28rem .7rem;border-radius:4px;margin-bottom:1.5rem}
.pcard.m .pbadge{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.pcard.n .pbadge{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.pname{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;line-height:1;letter-spacing:.03em;margin-bottom:.35rem}
.prole{font-size:.87rem;color:var(--text2);margin-bottom:2rem;font-weight:500}
.pstats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;padding:1.5rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:2rem}
.sv{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1}
.pcard.m .sv{color:var(--amber)}.pcard.n .sv{color:var(--blue)}
.sk{font-size:.7rem;color:var(--text3);margin-top:.15rem;line-height:1.4;letter-spacing:.02em}
.pskills{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:2rem}
.chip{font-family:'JetBrains Mono',monospace;font-size:.67rem;padding:.22rem .6rem;border-radius:3px;letter-spacing:.04em}
.pcard.m .chip{background:var(--amber-bg);color:#d97706;border:1px solid rgba(245,158,11,.15)}
.pcard.n .chip{background:var(--blue-bg);color:#93c5fd;border:1px solid rgba(96,165,250,.15)}
.pcon{display:flex;flex-direction:column;gap:.65rem;margin-bottom:1.8rem}
.cline{display:flex;align-items:center;gap:.7rem;font-size:.84rem;color:var(--text2)}
.cline svg{opacity:.4;flex-shrink:0}
.cline a{color:inherit;text-decoration:none;transition:color .2s}
.cline a:hover{color:var(--text)}
.libtn{display:inline-flex;align-items:center;gap:.55rem;padding:.6rem 1.2rem;border-radius:7px;font-size:.83rem;font-weight:600;text-decoration:none;transition:all .2s}
.pcard.m .libtn{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber)}
.pcard.m .libtn:hover{background:rgba(245,158,11,.16)}
.pcard.n .libtn{background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue)}
.pcard.n .libtn:hover{background:rgba(96,165,250,.16)}

/* ── QUICK CERTS (employer highlight) ── */
.qcert-sec{padding:4rem 1.5rem;background:var(--bg2);border-top:1px solid var(--border)}
.qcert-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;max-width:1140px;margin:2rem auto 0}
.qcert{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.2rem 1.5rem;display:flex;align-items:flex-start;gap:1rem;transition:border-color .2s,transform .2s}
.qcert:hover{transform:translateY(-2px)}
.qcert.m:hover{border-color:var(--amber-bd)}
.qcert.n:hover{border-color:var(--blue-bd)}
.qcert-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:.4rem}
.qcert.m .qcert-dot{background:var(--amber)}
.qcert.n .qcert-dot{background:var(--blue)}
.qcert-body{}
.qcert-who{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.3rem}
.qcert.m .qcert-who{color:var(--amber)}.qcert.n .qcert-who{color:var(--blue)}
.qcert-name{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.2rem;line-height:1.35}
.qcert-code{font-family:'JetBrains Mono',monospace;font-size:.67rem;color:var(--text3);line-height:1.5}
.qcert-valid{display:flex;align-items:center;gap:.4rem;margin-top:.55rem}
.vd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.vd.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.vd.no{background:var(--red)}
.qcert-valid span{font-size:.75rem;color:var(--text2)}
.qcert-valid .dt{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text3)}

/* ── GALLERY ── */
.gal-sec{padding:5rem 1.5rem}
.slider-outer{max-width:1140px;margin:0 auto}
.slider-box{position:relative;width:100%;background:#000;border-radius:12px;overflow:hidden;border:1px solid var(--border);aspect-ratio:16/9;user-select:none;cursor:grab}
.slider-box:active{cursor:grabbing}
.slider-track{display:flex;width:100%;height:100%;transition:transform .42s cubic-bezier(.4,0,.2,1)}
.slide{flex:0 0 100%;width:100%;height:100%;position:relative;overflow:hidden;background:var(--bg3)}
.slide img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .35s}
.slide img.vis{opacity:1}
.s-caption{position:absolute;bottom:0;left:0;right:0;padding:1.5rem 2rem 1.2rem;background:linear-gradient(to top,rgba(0,0,0,.78),transparent);display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;pointer-events:none}
.s-caption-txt{font-size:.88rem;color:rgba(255,255,255,.85);line-height:1.4}




.s-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;color:var(--text3)}
.s-ph-icon{font-size:2.5rem;opacity:.2}
.s-ph-txt{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;opacity:.35;max-width:260px;text-align:center;line-height:1.6}
.s-btn{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.1);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .2s;z-index:10}
.s-btn:hover{background:rgba(0,0,0,.82);transform:translateY(-50%) scale(1.08)}
.s-btn.prev{left:1rem}.s-btn.next{right:1rem}
.s-counter{position:absolute;top:1rem;right:1rem;font-family:'JetBrains Mono',monospace;font-size:.7rem;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:.25rem .65rem;border-radius:20px;z-index:10;letter-spacing:.05em}
.thumb-strip{display:flex;gap:.5rem;padding:.65rem 0;overflow-x:auto;margin-top:.75rem;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.thumb-strip::-webkit-scrollbar{height:4px}
.thumb-strip::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.thumb{flex:0 0 80px;height:56px;border-radius:5px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .2s;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.thumb:hover{transform:translateY(-2px)}
.thumb.on{border-color:var(--amber)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .3s}
.thumb img.vis{opacity:1}
.thumb-ph{font-size:1.1rem;opacity:.2}
.up-hint{margin-top:1.5rem;background:var(--bg2);border:1px dashed var(--border2);border-radius:8px;padding:1.2rem 1.5rem;display:flex;align-items:center;gap:1rem}
.up-hint-icon{font-size:1.4rem;opacity:.45;flex-shrink:0}
.up-hint-txt{font-size:.82rem;color:var(--text3);line-height:1.5}
.up-hint-txt strong{color:var(--text2)}
.up-hint-txt code{font-family:'JetBrains Mono',monospace;font-size:.72rem;background:var(--bg3);padding:.1rem .4rem;border-radius:3px;color:var(--amber)}

/* ── EXPERIENCE ── */
.exp-sec{padding:5rem 1.5rem;background:var(--bg2)}
.tl{position:relative}
.tl::before{content:'';position:absolute;left:6px;top:4px;bottom:0;width:1px;background:var(--border)}
.tl-item{padding-left:1.8rem;padding-bottom:2rem;position:relative}
.tl-item::before{content:'';position:absolute;left:2px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--bg2);border:1.5px solid}
.mc .tl-item::before{border-color:var(--amber)}
.nc .tl-item::before{border-color:var(--blue)}
.tl-d{font-family:'JetBrains Mono',monospace;font-size:.66rem;letter-spacing:.08em;color:var(--text3);margin-bottom:.25rem}
.tl-c{font-weight:600;font-size:.93rem;color:var(--text);margin-bottom:.1rem}
.tl-r{font-size:.82rem;font-weight:500;margin-bottom:.15rem}
.mc .tl-r{color:#d97706}.nc .tl-r{color:#93c5fd}
.tl-l{font-family:'JetBrains Mono',monospace;font-size:.64rem;color:var(--text3);margin-bottom:.35rem}
.tl-t{font-size:.82rem;color:var(--text2);line-height:1.55}

/* ── FULL CERTS ── */
.cert-sec{padding:5rem 1.5rem}
.cert-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.4rem 1.5rem;margin-bottom:.75rem;transition:border-color .2s,transform .2s}
.cert-card:hover{transform:translateX(4px)}
.mc2 .cert-card:hover{border-color:var(--amber-bd)}
.nc2 .cert-card:hover{border-color:var(--blue-bd)}
.cert-card.exp{opacity:.4}
.cert-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.5rem}
.cert-name{font-weight:600;font-size:.9rem;color:var(--text);line-height:1.4}
.cert-iss{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.mc2 .cert-iss{color:#d97706}.nc2 .cert-iss{color:#93c5fd}
.cert-code{font-family:'JetBrains Mono',monospace;font-size:.69rem;color:var(--text3);margin-bottom:.75rem;line-height:1.5}
.cert-foot{display:flex;align-items:center;gap:.5rem;font-size:.77rem;color:var(--text2)}
.vdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.vdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.vdot.no{background:var(--red)}
.cert-dt{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text3)}

/* ── LANGS ── */
.lang-sec{padding:3rem 1.5rem 5rem;border-top:1px solid var(--border)}
.lpill{display:inline-flex;align-items:center;gap:.6rem;padding:.45rem 1rem;border-radius:6px;border:1px solid var(--border2);font-size:.83rem;margin:.3rem}
.llvl{font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--text3)}

.contact-footer{background:var(--bg2);border-top:1px solid var(--border);padding:4rem 1.5rem}
.contact-grid{max-width:1140px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.contact-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2rem}
.contact-card.m{border-top:3px solid var(--amber)}
.contact-card.n{border-top:3px solid var(--blue)}
.cc-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.04em;margin-bottom:.3rem}
.cc-role{font-size:.83rem;color:var(--text2);margin-bottom:1.5rem;font-weight:500}
.cc-lines{display:flex;flex-direction:column;gap:.7rem}
.cc-line{display:flex;align-items:center;gap:.7rem;font-size:.88rem;color:var(--text2)}
.cc-line svg{opacity:.4;flex-shrink:0}
.cc-line a{color:inherit;text-decoration:none;transition:color .2s}
.cc-line a:hover{color:var(--text)}
.cc-li{display:inline-flex;align-items:center;gap:.5rem;margin-top:1.2rem;padding:.55rem 1.1rem;border-radius:7px;font-size:.82rem;font-weight:600;text-decoration:none;transition:all .2s}
.contact-card.m .cc-li{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber)}
.contact-card.m .cc-li:hover{background:rgba(245,158,11,.16)}
.contact-card.n .cc-li{background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue)}
.contact-card.n .cc-li:hover{background:rgba(96,165,250,.16)}

footer{padding:1.8rem 1.5rem;text-align:center;border-top:1px solid var(--border)}
.f-copy{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text3)}

/* ── LIGHTBOX ── */
.lb{display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.93);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column}
.lb.open{display:flex}
.lb-wrap{position:relative;max-width:92vw;max-height:82vh}
.lb-wrap img{max-width:92vw;max-height:82vh;object-fit:contain;border-radius:6px;display:block}
.lb-close{position:absolute;top:-2.5rem;right:0;background:none;border:none;color:rgba(255,255,255,.55);cursor:pointer;font-size:1.5rem;line-height:1;transition:color .2s}
.lb-close:hover{color:#fff}
.lb-cap{margin-top:1rem;font-size:.84rem;color:rgba(255,255,255,.5);font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
.lb-nav{display:flex;gap:1rem;margin-top:1rem}
.lb-nav button{padding:.45rem 1.2rem;border-radius:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.65);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.75rem;letter-spacing:.08em;transition:all .2s}
.lb-nav button:hover{background:rgba(255,255,255,.14);color:#fff}

/* ── FADE ── */
.fi{opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
.fi.v{opacity:1;transform:none}

/* ── RESPONSIVE ── */
@media(max-width:900px){.two{grid-template-columns:1fr}.contact-grid{grid-template-columns:1fr}}

@media(max-width:640px){.nav-links{display:none}.pcard{padding:1.8rem}.pstats{grid-template-columns:repeat(2,1fr)}.s-btn{width:34px;height:34px}.hero-cta{flex-direction:column;align-items:center}}

/* ═══ RENDER ═══ */

  document.getElementById('lb-prev').textContent = x.lb_prev;
  document.getElementById('lb-next').textContent = x.lb_next;
  syncSlider(false);
  initLazy();
  initFade();

/* ═══ SLIDER ═══ */
function syncSlider(animate) {
  var track = document.getElementById('sTrack');
  var ctr   = document.getElementById('sCtr');
  if (!track) return;
  if (animate === false) {
    track.style.transition = 'none';
    track.style.transform  = 'translateX(-'+(cur*100)+'%)';
    setTimeout(function(){ track.style.transition=''; }, 30);
  } else {
    track.style.transform = 'translateX(-'+(cur*100)+'%)';
  }
  if (ctr) ctr.textContent = (cur+1)+' / '+PHOTOS.length;
  var thumbs = document.querySelectorAll('.thumb');
  for (var i=0;i<thumbs.length;i++) thumbs[i].classList.toggle('on', i===cur);
  var active = document.getElementById('th-'+cur);
  if (active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  var slides = document.querySelectorAll('.slide');
  [-1,0,1].forEach(function(offset){
    var idx=cur+offset;
    if (idx>=0 && idx<slides.length) {
      slides[idx].querySelectorAll('img[data-src]').forEach(function(img){ lazyOne(img); });
    }
  });
}
function goTo(i){ cur=Math.max(0,Math.min(i,PHOTOS.length-1)); syncSlider(true); }
function next(){ goTo((cur+1)%PHOTOS.length); }
function prev(){ goTo((cur-1+PHOTOS.length)%PHOTOS.length); }
function dStart(e){ dragging=true; dragX=e.clientX; }
function dMove(e){ /* handled in dEnd */ }
function dEnd(e){ if(!dragging)return; dragging=false; if(e&&Math.abs(e.clientX-dragX)>50){e.clientX<dragX?next():prev();} }
function tStart(e){ dragX=e.touches[0].clientX; }
function tMove(e){ /* passive */ }
function tEnd(e){ var dx=e.changedTouches[0].clientX-dragX; if(Math.abs(dx)>50){dx<0?next():prev();} }

/* ═══ LIGHTBOX ═══ */
function openLb(i){
  var p=PHOTOS[i]; if(!p||!p.id) return;
  lbIdx=i;
  document.getElementById('lb-img').src = cldUrl(p.id,1800);
  document.getElementById('lb-cap').textContent = cap(p);
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLb(){ document.getElementById('lb').classList.remove('open'); document.body.style.overflow=''; }
function lbPrev(){ openLb((lbIdx-1+PHOTOS.length)%PHOTOS.length); }
function lbNext(){ openLb((lbIdx+1)%PHOTOS.length); }

/* ═══ LAZY LOAD ═══ */
function lazyOne(img){
  if(!img.dataset.src||img.src===img.dataset.src) return;
  img.src=img.dataset.src;
  img.onload=function(){ img.classList.add('vis'); };
  img.onerror=function(){ img.classList.add('vis'); };
}
function initLazy(){
  var imgs=document.querySelectorAll('img[data-src]');
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(e){ if(e.isIntersecting){ lazyOne(e.target); io.unobserve(e.target); } });
    },{rootMargin:'200px'});
    imgs.forEach(function(img){ io.observe(img); });
  } else { imgs.forEach(lazyOne); }
}

/* ═══ FADE IN ═══ */
function initFade(){
  var els=document.querySelectorAll('.fi');
  if('IntersectionObserver' in window){
    var fo=new IntersectionObserver(function(entries){
      entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('v'); fo.unobserve(e.target); } });
    },{threshold:0.07});
    els.forEach(function(el){ fo.observe(el); });
  } else { els.forEach(function(el){ el.classList.add('v'); }); }
}

/* ═══ EVENTS ═══ */
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowRight') next();
  if(e.key==='ArrowLeft')  prev();
  if(e.key==='Escape')     closeLb();
});
document.getElementById('lb').addEventListener('click', function(e){ if(e.target===this) closeLb(); });
document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', lbPrev);
document.getElementById('lb-next').addEventListener('click', lbNext);

/* ═══ LANG ═══ */
function setLang(l){ lang=l; render(); }

/* ═══ BOOT ═══ */
document.addEventListener('DOMContentLoaded', function(){
  render();
  // Autoplay: advance every 4 seconds
  setInterval(function(){
    if (!document.getElementById('lb') || !document.getElementById('lb').classList.contains('open')) {
      next();
    }
  }, 4000);
});
</script>
